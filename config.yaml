config:
  httpFile: "request.http"
  prometheus: false
  breaker_threshold_pct: 20.0
  jitter: 0.1        # ±10% organic noise on the RPS ticker
  time_scale: 1.0    # 1.0 = real-time; 2.0 = run 2x faster (warp speed)

# ── Snap memory & inference tuning ───────────────────────────────────────────
# ⚠  CAUTION: These settings directly affect memory consumption and the
#    statistical accuracy of schema inference. Incorrect values can cause:
#      - Too low  max_samples → unreliable schema field presence fractions
#      - Too high max_samples or max_body_kb on high-RPS runs → excessive
#        memory growth (the very problem these limits are designed to prevent)
#
#    Only change these from defaults when you have a specific reason to do so.
#    All fields are optional — omit this block entirely to use the application
#    defaults (sample_rate: 0.05, max_samples: 200, max_body_kb: 0).
#    CLI flags (--snap-sample, --snap-max-samples, --snap-max-body-kb) always
#    take precedence over values set here.
#
# snap:
#   sample_rate: 0.05   # Fraction of responses to body-sample (0.0–1.0).
#                       # Default: 0.05 (5%). Lower = less memory, less schema
#                       # coverage. Raise only on low-RPS runs where you need
#                       # higher schema confidence.
#   max_samples: 200    # Reservoir cap (per endpoint) for stored body samples.
#                       # Default: 200. Presence fractions are accurate to ±2%
#                       # at this level. Lowering below 50 degrades accuracy.
#   max_body_kb: 0      # Per-endpoint byte budget for stored bodies, in KB.
#                       # Default: 0 (no byte-based limit — max_samples is the
#                       # primary guard). Set this when individual response
#                       # bodies are large (e.g. > 50 KB) and max_samples alone
#                       # is insufficient to bound memory.

stages:
  # Stages use linear interpolation (LERP).
  # Each stage ramps from the previous stage's end target_rps to this
  # stage's target_rps over its duration.
  #
  # Special cases:
  #   duration: 0s  → instant step jump (spike), no interpolation
  #   target_rps: 0 → ramp down to zero (cool-down)
  #
  # gg infers a display label from the stage shape (shown in TUI timeline):
  #   target_rps rising  → "Ramp Up"
  #   target_rps same    → "Sustain"
  #   duration: 0s       → "Spike"
  #   target_rps falling → "Ramp Down"

  # 1. Ramp Up — 0 → 75 RPS over 10s
  - duration: 10s
    target_rps: 75

  # 2. Ramp Up — 75 → 500 RPS over 15s and sustain for 15s
  - duration: 15s
    target_rps: 500

  - duration: 15s
    target_rps: 500

  # 3. Ramp Down — 500 → 100 RPS over 10s
  - duration: 10s
    target_rps: 100

  # 4. Spike — 100 → 650 RPS
  - duration: 0s
    target_rps: 650

 # 5. Sustain — hold 650 RPS for 10s
  - duration: 10s
    target_rps: 650
 # 6. Ramp Down — 650 → 200 RPS over 10s
  - duration: 10s
    target_rps: 200
 # 7. Ramp Down — 200 → 0 RPS over 10 seconds (cool-down)
  - duration: 10s
    target_rps: 0