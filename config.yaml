config:
  httpFile: "request.http"
  prometheus: false
  breaker_threshold_pct: 20.0
  jitter: 0.1        # ±10% organic noise on the RPS ticker
  time_scale: 1.0    # 1.0 = real-time; 2.0 = run 2x faster (warp speed)

stages:
  # name is optional — it is a display label shown in the TUI timeline.
  # If omitted, gg infers a label from the stage shape:
  #   target_rps rising  → "Ramp Up"
  #   target_rps same    → "Sustain"
  #   duration: 0        → "Spike"
  #   target_rps falling → "Ramp Down"
  # It has no effect on engine behaviour — only duration and target_rps matter.

  # 1. Ramp Up — 0 → 50 RPS over 30 seconds (implicit: previous target was 0)
  - duration: 10s
    target_rps: 75

  # 2. Sustain — hold at 50 RPS for 1 minute
  - duration: 1m
    target_rps: 50

  # 3. Spike — jump instantly to 200 RPS (duration: 0 = step function)
  - duration: 0s
    target_rps: 200

  # 4. Hold Spike — sustain the spike load for 10 seconds
  - duration: 10s
    target_rps: 200

  # 5. Ramp Down — 200 → 0 RPS over 30 seconds (cool-down)
  - duration: 30s
    target_rps: 0
