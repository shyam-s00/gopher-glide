name: flash-sale
description: "Massive instant spike to 100% peak, hold for the entire run, then instant drop to zero. Models a product going live where every queued user hits at the same second."
default_duration: 3m
default_peak_rps: 2000

segments:
  - type: step
    duration_pct: 1.0
    rps_multiplier: 1.0

  - type: step          # instant drop — duration_pct: 0 means pure transition with no hold
    duration_pct: 0.0
    rps_multiplier: 0.0
