name: Release

# Triggers on a pushed version tag, e.g. v1.0.0, v1.2.3-beta.
# Can also be triggered manually via workflow_dispatch to re-run specific
# publish steps (Docker, Homebrew) against an already-released tag without
# creating a new one.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-release (e.g. v1.2.3) — must already exist in the repo"
        required: true
      skip:
        description: |
          Comma-separated GoReleaser publishers to skip.
          Valid values: docker, homebrew, publish (skips GitHub Release upload + brew + docker)
          Example: "docker" — rebuilds + re-publishes everything except Docker
          Leave blank to run everything.
        required: false
        default: ""

permissions:
  contents: write   # create GitHub Release and upload assets
  packages: write   # push Docker image to ghcr.io
  id-token: write   # future: OIDC attestation support

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      # ── For workflow_dispatch: check out the specified tag instead of HEAD ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by GoReleaser for changelog + version resolution
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build the --skip flag string ────────────────────────────────────────
      # On a normal tag push the skip input is empty → no --skip flag added.
      # On workflow_dispatch the user-supplied skip value is forwarded as-is.
      - name: Resolve GoReleaser args
        id: gr_args
        shell: bash
        run: |
          BASE="release --clean"
          SKIP="${{ inputs.skip }}"
          if [[ -n "$SKIP" ]]; then
            # GoReleaser accepts: --skip=docker,homebrew  (comma-separated, no spaces)
            SKIP_NORMALIZED=$(echo "$SKIP" | tr -d ' ')
            BASE="$BASE --skip=$SKIP_NORMALIZED"
          fi
          echo "args=$BASE" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: ${{ steps.gr_args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
