name: wave
description: "Oscillating RPS approximating a sine wave over 3 full cycles. Tests auto-scaling elasticity: validates that the infrastructure scales both OUT and IN cleanly without over-provisioning permanently."
default_duration: 12m
default_peak_rps: 500

# trough = 20% of peak | 3 cycles x (2m rise + 2m fall) = 12m
# each half-cycle = 2/12 ~= 0.167

segments:
  - type: linear
    duration_pct: 0.167
    rps_multiplier: 1.0

  - type: linear
    duration_pct: 0.167
    rps_multiplier: 0.20

  - type: linear
    duration_pct: 0.167
    rps_multiplier: 1.0

  - type: linear
    duration_pct: 0.167
    rps_multiplier: 0.20

  - type: linear
    duration_pct: 0.167
    rps_multiplier: 1.0

  - type: linear
    duration_pct: 0.165
    rps_multiplier: 0.20
